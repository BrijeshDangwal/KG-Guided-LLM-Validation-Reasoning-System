<svg width="680" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg" style="background:#fff;font-family:Arial,sans-serif">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" font-size="16" font-weight="600" fill="#2C2C2A">KG-guided LLM validation pipeline</text>
  <text x="340" y="48" text-anchor="middle" font-size="12" fill="#888780">9-step claim verification over novel text corpora</text>

  <!-- INPUT: Source data -->
  <rect x="40" y="72" width="130" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="105" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">Novels (TXT)</text>

  <rect x="190" y="72" width="130" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="255" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">Train CSV</text>

  <rect x="340" y="72" width="130" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="405" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">Test CSV</text>

  <!-- Arrows from inputs -->
  <line x1="105" y1="116" x2="105" y2="148" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="255" y1="116" x2="255" y2="148" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="405" y1="116" x2="340" y2="148" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- PHASE 1 container -->
  <rect x="40" y="140" width="560" height="200" rx="16" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 4"/>
  <text x="56" y="160" font-size="12" fill="#888780">Phase 1 — data preparation</text>

  <!-- Step 1 -->
  <rect x="60" y="172" width="240" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="180" y="195" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">Step 1: text chunking</text>
  <text x="180" y="215" text-anchor="middle" font-size="11" fill="#0F6E56">Split novels into paragraphs</text>

  <!-- Step 2 -->
  <rect x="340" y="172" width="240" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="460" y="195" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">Step 2: claim extraction</text>
  <text x="460" y="215" text-anchor="middle" font-size="11" fill="#0F6E56">Extract verifiable claims</text>

  <line x1="300" y1="200" x2="338" y2="200" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <rect x="60" y="260" width="240" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="180" y="283" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">Step 3: fact mining</text>
  <text x="180" y="303" text-anchor="middle" font-size="11" fill="#0F6E56">Mine facts from text chunks</text>

  <!-- Step 4 -->
  <rect x="340" y="260" width="240" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="460" y="283" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">Step 4: evidence retrieval</text>
  <text x="460" y="303" text-anchor="middle" font-size="11" fill="#0F6E56">Match claims to evidence</text>

  <line x1="460" y1="228" x2="460" y2="258" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="180" y1="228" x2="180" y2="258" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="300" y1="288" x2="338" y2="288" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- PHASE 2 container -->
  <rect x="40" y="350" width="560" height="110" rx="16" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 4"/>
  <text x="56" y="370" font-size="12" fill="#888780">Phase 2 — knowledge graph + reasoning</text>

  <!-- Step 5 -->
  <rect x="60" y="382" width="240" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="180" y="405" text-anchor="middle" font-size="13" font-weight="600" fill="#3C3489">Step 5: build KG</text>
  <text x="180" y="425" text-anchor="middle" font-size="11" fill="#534AB7">Triple extraction + filtering</text>

  <!-- Step 6 -->
  <rect x="340" y="382" width="240" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="460" y="405" text-anchor="middle" font-size="13" font-weight="600" fill="#3C3489">Step 6: logic constraints</text>
  <text x="460" y="425" text-anchor="middle" font-size="11" fill="#534AB7">Detect contradictions</text>

  <line x1="180" y1="316" x2="180" y2="380" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="460" y1="316" x2="460" y2="380" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="300" y1="410" x2="338" y2="410" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- PHASE 3 container -->
  <rect x="40" y="490" width="560" height="200" rx="16" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 4"/>
  <text x="56" y="510" font-size="12" fill="#888780">Phase 3 — aggregation + output</text>

  <!-- Step 7 -->
  <rect x="160" y="522" width="320" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="320" y="545" text-anchor="middle" font-size="13" font-weight="600" fill="#712B13">Step 7: aggregate scores</text>
  <text x="320" y="565" text-anchor="middle" font-size="11" fill="#993C1D">Evidence + constraints → verdict</text>

  <line x1="320" y1="438" x2="320" y2="520" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 8 -->
  <rect x="60" y="610" width="240" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="180" y="633" text-anchor="middle" font-size="13" font-weight="600" fill="#712B13">Step 8: dossier</text>
  <text x="180" y="653" text-anchor="middle" font-size="11" fill="#993C1D">Human-readable reports</text>

  <!-- Step 9 -->
  <rect x="340" y="610" width="240" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="460" y="633" text-anchor="middle" font-size="13" font-weight="600" fill="#712B13">Step 9: package</text>
  <text x="460" y="653" text-anchor="middle" font-size="11" fill="#993C1D">Bundle deliverables</text>

  <line x1="250" y1="578" x2="180" y2="608" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="390" y1="578" x2="460" y2="608" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="490" y="72" width="110" height="44" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="545" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#27500A">Results CSV</text>
  <line x1="545" y1="116" x2="545" y2="690" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="460" y1="666" x2="535" y2="690" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

</svg>
